  <style>
    :root {
      --green-dark: #0F4C3A;
      --green-mid: #1A6B50;
      --green-light: #4F845E;
      --gold: #D4AF37;
      --white: #ffffff;
      --off-white: #F9FAFB;
      --text-dark: #1F2937;
      --text-mid: #4B5563;
      --shadow: rgba(31,41,55,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hind Siliguri', sans-serif;
      background: var(--off-white);
      color: var(--text-dark);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 4rem 1.5rem 3rem; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--green-dark);
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .heading {
      text-align: center;
      margin-bottom: 0.75rem;
      font-family: 'Noto Serif Bengali', serif;
      font-size: clamp(2rem, 3vw, 3rem);
      color: var(--green-dark);
      line-height: 1.1;
    }

    .subtext {
      max-width: 700px;
      margin: 0 auto 2.5rem;
      text-align: center;
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text-mid);
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .filter-pill {
      border: 1px solid rgba(31,41,55,0.1);
      background: var(--white);
      color: var(--text-dark);
      padding: 0.9rem 1.4rem;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s, color 0.2s;
      font-weight: 700;
      box-shadow: 0 10px 25px rgba(31,41,55,0.04);
    }

    .filter-pill.active,
    .filter-pill:hover {
      background: var(--gold);
      color: var(--green-dark);
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(31,41,55,0.12);
      border-color: var(--gold);
    }

    .member-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 1.5rem;
      align-items: stretch;
    }

    .member-card {
      background: var(--white);
      border: 1px solid rgba(31,41,55,0.08);
      border-radius: 24px;
      padding: 2rem;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 18px 45px rgba(31,41,55,0.06);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .member-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 28px 80px rgba(31,41,55,0.12);
      border-color: rgba(212,175,55,0.16);
    }

    .member-card::before {
      content: '';
      position: absolute;
      top: -20px;
      right: -20px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(212,175,55,0.15);
    }

    .member-card-icon {
      width: 60px;
      height: 60px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
      color: #fff;
      font-size: 1.5rem;
      box-shadow: 0 10px 22px rgba(31,41,55,0.1);
      z-index: 1;
    }

    .member-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--green-dark);
      z-index: 1;
    }

    .member-card-desc {
      color: var(--text-mid);
      line-height: 1.8;
      flex-grow: 1;
      z-index: 1;
    }

    .member-category {
      display: inline-flex;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      background: rgba(15,76,58,0.08);
      color: var(--green-dark);
      font-size: 0.85rem;
      font-weight: 700;
      z-index: 1;
    }

    .footer-note {
      margin-top: 3rem;
      text-align: center;
      color: var(--text-mid);
      font-size: 0.95rem;
    }

    .load-more-btn {
      display: block;
      margin: 2.5rem auto 0;
      padding: 0.95rem 2rem;
      background: var(--gold);
      color: var(--green-dark);
      border: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 14px 32px rgba(31,41,55,0.12);
    }

    .load-more-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 45px rgba(31,41,55,0.15);
    }

    .load-more-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 900px) {
      .member-list { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
    }

    @media (max-width: 650px) {
      .member-list { grid-template-columns: 1fr; }
      .filter-row { gap: 0.75rem; }
    }
  </style>
</head>

      { id: '43', category: 'member', icon: '📚', name: 'জাহিদুল ইসলাম', description: 'গ্রামীন শিক্ষা সহায়তা ও লাইব্রেরি কার্যক্রম চালান।' },
      { id: '44', category: 'member', icon: '🧶', name: 'শোভন কুমার', description: 'কুটির শিল্প ও হস্তশিল্প প্রশিক্ষণে কাজ করেন।' },
      { id: '45', category: 'member', icon: '🪴', name: 'ফারিহা হোসেন', description: 'নারী উদ্যোক্তা সাপোর্ট প্রোগ্রামে সক্রিয়।' },
      { id: '46', category: 'member', icon: '📦', name: 'সুমনের রহমান', description: 'বিতরণ কার্যক্রম ও পাবলিক সাপোর্ট টিমে কাজ করেন।' },
      { id: '47', category: 'member', icon: '🧠', name: 'কে.এম. রাশিদ', description: 'কম্পিউটার ও ডিজিটাল শিক্ষায় যুবকদের সাহায্য করেন।' },
      { id: '48', category: 'member', icon: '🧾', name: 'রোজিনা আক্তার', description: 'আর্থিক সচেতনতা ও সাশ্রয় প্রকল্পে কাজ করেন।' },
      { id: '49', category: 'member', icon: '🩺', name: 'সাব্বির হাসান', description: 'স্বাস্থ্য চেতনা ও ফ্রি ক্লিনিক কার্যক্রমে নিয়মিত অংশ নেন।' },
      { id: '50', category: 'member', icon: '🌺', name: 'মৌসুমী আক্তার', description: 'সম্প্রদায় উন্নয়ন ও সাংস্কৃতিক কার্যক্রমে সক্রিয় সদস্য।' }
    ];

    function loadMembers() {
      const saved = localStorage.getItem(storageKey);
      try {
        return saved ? JSON.parse(saved) : defaultMembers.slice();
      } catch (err) {
        return defaultMembers.slice();
      }
    }

    function saveMembers(items) {
      localStorage.setItem(storageKey, JSON.stringify(items));
    }

    function getCategoryText(category) {
      if (category === 'advisor') return 'উপদেষ্টা';
      if (category === 'executive') return 'নির্বাহী সদস্য';
      if (category === 'member') return 'সদস্য';
      return 'অন্যান্য';
    }

    const buttons = document.querySelectorAll('.filter-pill');
    const list = document.getElementById('memberList');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    let members = loadMembers();
    
    const itemsPerPage = 12;
    let currentPage = 1;
    let currentFilter = 'all';
    let filteredMembers = members;

    function renderList(filter = 'all', reset = true) {
      if (reset) {
        currentPage = 1;
        currentFilter = filter;
        filteredMembers = members.filter(m => filter === 'all' || m.category === filter);
      }
      
      if (!filteredMembers.length) {
        list.innerHTML = '<p style="color: var(--text-mid);">এই ক্যাটাগরিতে কোনো সদস্য নেই।</p>';
        loadMoreBtn.style.display = 'none';
        return;
      }

      const endIndex = currentPage * itemsPerPage;
      const itemsToShow = filteredMembers.slice(0, endIndex);
      const hasMore = filteredMembers.length > endIndex;

      list.innerHTML = itemsToShow.map(member => `
        <article class="member-card" data-category="${member.category}">
          <div class="member-card-icon">${member.icon}</div>
          <div class="member-card-title">${member.name}</div>
          <div class="member-category">${getCategoryText(member.category)}</div>
          <p class="member-card-desc">${member.description}</p>
        </article>
      `).join('');

      if (hasMore) {
        loadMoreBtn.style.display = 'block';
        loadMoreBtn.textContent = `আরও সদস্য দেখান (${endIndex} / ${filteredMembers.length})`;
      } else {
        loadMoreBtn.style.display = 'none';
      }
    }

    buttons.forEach(btn => btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderList(btn.dataset.filter, true);
    }));

    loadMoreBtn.addEventListener('click', () => {
      currentPage++;
      renderList(currentFilter, false);
      list.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    renderList('all');
  </script>
<script src="scroll-restore.js"></script>
</body>
</html>
